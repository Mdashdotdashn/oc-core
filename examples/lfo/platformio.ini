# oc-core: Teensy 3.6 build configuration
# Each example is its own PlatformIO project with its own platformio.ini.
# This keeps them completely isolated from ArticCircle.

[env:teensy36]
platform = teensy
board    = teensy36
; No 'framework = arduino' — we only use what we explicitly include.
; Teensy bare-metal build via PlatformIO.
framework = arduino

board_build.f_cpu = 120000000

build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wl,--relax
    ; Include paths for oc-core framework headers and this example
    -I../../include
    -I../../src/platforms/teensy36
    -I../../src

; Source files: framework core + Teensy platform impl + this example
build_src_filter =
    +<../../src/core/*.cpp>
    +<../../src/platforms/teensy36/*.cpp>
    +<*.cpp>

upload_protocol = teensy-cli
monitor_speed   = 115200

[env:teensy36_debug]
extends     = teensy36
build_flags =
    ${env:teensy36.build_flags}
    -g
    -O0
