# oc-core: Teensy 3.2 build configuration
# Each example is its own PlatformIO project with its own platformio.ini.
# This keeps them completely isolated from ArticCircle.

[platformio]
; Sources live at the project root (main.cpp), not in a src/ subfolder.
src_dir = .
; Default to the release env so plain 'pio run' and 'make flash' don't also
; build the debug env.
default_envs = teensy32

[env:teensy32]
platform = teensy
board    = teensy31
framework = arduino

board_build.f_cpu = 72000000

lib_deps =
    https://github.com/pedvide/ADC.git

build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wl,--relax
    -I../../core/include
    -I../../platform/include

; Source files: framework core + Teensy platform impl + this example
build_src_filter =
    +<../../core/src/*.cpp>
    +<../../platform/src/*.cpp>
    +<../../platform/src/drivers/SH1106_128x64_driver.cpp>
    +<main.cpp>

upload_protocol = teensy-cli
; -s triggers a USB soft-reboot of the running firmware so you don't need
; to press the reset button. Requires the board to already be running
; oc-core (or any Teensy firmware with USB enabled). First flash on a blank
; board still needs a manual button press.
upload_flags    = -s
monitor_speed   = 115200

[env:teensy32_debug]
platform    = teensy
board       = teensy31
framework   = arduino
build_type  = debug
board_build.f_cpu = 72000000
lib_deps    = https://github.com/pedvide/ADC.git
build_flags =
    ${env:teensy32.build_flags}
    -g
    -O0
build_src_filter = ${env:teensy32.build_src_filter}
upload_protocol  = teensy-cli
upload_flags     = -s
monitor_speed    = 115200
