[platformio]
src_dir      = .
default_envs = teensy32

[env:teensy32]
platform          = teensy
board             = teensy31
board_build.f_cpu = 72000000L
framework         = arduino
lib_deps          = https://github.com/pedvide/ADC.git
build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -I../../oc/include
    -I../../platform/include


upload_protocol = teensy-cli
upload_flags    = -s
build_src_filter =
    +<../../oc/src/*.cpp>
    +<../../platform/src/*.cpp>
    +<../../platform/src/drivers/SH1106_128x64_driver.cpp>
    +<../../platform/src/drivers/weegfx.cpp>
    +<main.cpp>

[env:teensy32_debug]
extends    = env:teensy32
build_type = debug
build_flags =
    ${env:teensy32.build_flags}
    -g
    -O0
