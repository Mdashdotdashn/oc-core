[platformio]
src_dir      = .
default_envs = teensy32

[env:teensy32]
platform          = teensy
board             = teensy31
board_build.f_cpu = 72000000L
framework         = arduino
lib_deps =
    ../../../platform
    ../../../oc
    https://github.com/pedvide/ADC.git
build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
upload_protocol = teensy-cli
upload_flags    = -s

[env:teensy32_debug]
extends    = env:teensy32
build_type = debug
build_flags =
    ${env:teensy32.build_flags}
    -g
    -O0