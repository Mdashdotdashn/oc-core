[platformio]
src_dir      = .
default_envs = teensy32

[env:teensy32]
platform          = teensy
board             = teensy31
board_build.f_cpu = 72000000L
framework         = arduino
lib_deps          = https://github.com/pedvide/ADC.git
build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -I../../include
    -I../../src/platforms/teensy32
    -I../../src/platforms/teensy32/drivers
    -I../../src
upload_protocol = teensy-cli
upload_flags    = -s
build_src_filter =
    +<../../src/core/*.cpp>
    +<../../src/platforms/teensy32/*.cpp>
    +<../../src/platforms/teensy32/drivers/SH1106_128x64_driver.cpp>
    +<../../src/platforms/teensy32/drivers/weegfx.cpp>
    +<main.cpp>