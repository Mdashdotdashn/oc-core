# oc-core: Teensy 3.2 build configuration — voltage example

[platformio]
src_dir     = .
default_envs = teensy32

[env:teensy32]
platform = teensy
board    = teensy31
framework = arduino

board_build.f_cpu = 72000000

lib_deps =
    https://github.com/pedvide/ADC.git

build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wl,--relax
    -I../../include
    -I../../src/platforms/teensy32
    -I../../src

build_src_filter =
    +<../../src/core/*.cpp>
    +<../../src/platforms/teensy32/*.cpp>
    +<main.cpp>

upload_protocol = teensy-cli
upload_flags    = -s
monitor_speed   = 115200

[env:teensy32_debug]
platform    = teensy
board       = teensy31
framework   = arduino
build_type  = debug
board_build.f_cpu = 72000000
lib_deps    = https://github.com/pedvide/ADC.git
build_flags =
    ${env:teensy32.build_flags}
    -g
    -O0
build_src_filter = ${env:teensy32.build_src_filter}
upload_protocol  = teensy-cli
upload_flags     = -s
monitor_speed    = 115200
