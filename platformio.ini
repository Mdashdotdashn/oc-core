# oc-core / tu-core — root PlatformIO project
#
# All examples share a single build tree so FrameworkArduino, Teensy_ADC and
# the oc-platform / oc-framework / tu-framework libraries are compiled once
# and reused across every example.
#
# Usage:
#   pio run                          # build all examples
#   pio run -e oc_lfo                # build one example
#   pio run -e oc_lfo -t upload      # flash one example
#   make flash EXAMPLE=oc/lfo        # same via Makefile

[platformio]
src_dir         = .
build_cache_dir = ~/.cache/pio-oc-core
default_envs =
    oc_calibration
    oc_cpu_meter
    oc_test
    tu_clock_test
    tu_display_test
    tu_output_test

# ── Shared base envs (not built directly) ─────────────────────────────────────

[env:_oc_base]
platform          = teensy
board             = teensy31
board_build.f_cpu = 72000000L
framework         = arduino
lib_deps =
    ./platform
    ./oc
    https://github.com/pedvide/ADC.git
build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
upload_protocol = teensy-cli
upload_flags    = -s

[env:_tu_base]
platform          = teensy
board             = teensy31
board_build.f_cpu = 120000000L
framework         = arduino
lib_deps =
    ./platform
    ./tu
    https://github.com/pedvide/ADC.git
build_flags =
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
upload_protocol = teensy-cli
upload_flags    = -s

# ── OC examples ───────────────────────────────────────────────────────────────

[env:oc_calibration]
extends          = env:_oc_base
build_src_flags  = -Iexamples/oc/oc_calibration
build_src_filter = -<*> +<examples/oc/oc_calibration/main.cpp>

[env:oc_cpu_meter]
extends          = env:_oc_base
build_src_flags  = -Iexamples/oc/cpu_meter
build_src_filter = -<*> +<examples/oc/cpu_meter/main.cpp>

[env:oc_test]
extends          = env:_oc_base
build_src_flags  = -Iexamples/oc/oc_test
build_src_filter = -<*> +<examples/oc/oc_test/main.cpp>

# ── TU examples ───────────────────────────────────────────────────────────────

[env:tu_clock_test]
extends          = env:_tu_base
build_src_flags  = -Iexamples/tu/clock_test
build_src_filter = -<*> +<examples/tu/clock_test/main.cpp>

[env:tu_display_test]
extends          = env:_tu_base
build_src_flags  = -Iexamples/tu/display_test
build_src_filter = -<*> +<examples/tu/display_test/main.cpp>

[env:tu_output_test]
extends          = env:_tu_base
build_src_flags  = -Iexamples/tu/output_test
build_src_filter = -<*> +<examples/tu/output_test/main.cpp>
